</div>
    <div class="password-page">
        <div class="password-card">
            <div class="top-bar">
                <a href="{{ url_for('index') }}" class="back-btn">← 返回首頁</a>
            </div>

            <h1>更改密碼</h1>
            <p class="subtitle">請先輸入舊密碼，再設定新的登入密碼</p>

            <div class="user-box">
                <span class="label">目前登入帳號：</span>
                <span id="currentUsername" class="username-text">未登入</span>
            </div>

            <form id="passwordForm" class="password-form">
                <div class="form-group">
                    <label for="oldPassword">舊密碼</label>
                    <input type="password" id="oldPassword" placeholder="請輸入舊密碼" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">新密碼</label>
                    <input type="password" id="newPassword" placeholder="請輸入新密碼" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">確認新密碼</label>
                    <input type="password" id="confirmPassword" placeholder="請再次輸入新密碼" required>
                </div>

                <button type="submit" class="submit-btn">確認修改密碼</button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message ${type}`;
        }

        document.addEventListener('DOMContentLoaded', function () {
            const username = localStorage.getItem('username');
            const userId = localStorage.getItem('user_id');

            if (!username || !userId) {
                document.getElementById('currentUsername').textContent = '未登入';
                showMessage('請先登入後再更改密碼', 'error');
                setTimeout(() => {
                    window.location.href = '{{ url_for("index") }}';
                }, 1800);
                return;
            }

            document.getElementById('currentUsername').textContent = username;
        });

        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = localStorage.getItem('username');
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!username) {
                showMessage('請先登入', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('新密碼至少需要 6 個字符', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('兩次輸入的新密碼不一致', 'error');
                return;
            }

            if (oldPassword === newPassword) {
                showMessage('新密碼不能與舊密碼相同', 'error');
                return;
            }

            try {
                const response = await fetch('/reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage(result.message || '密碼修改成功', 'success');
                    document.getElementById('passwordForm').reset();
                } else {
                    showMessage(result.error || '修改失敗', 'error');
                }
            } catch (error) {
                showMessage('網絡錯誤，請稍後再試', 'error');
            }
        });
        function toggleSideMenu() {
            const panel = document.getElementById('sideMenuPanel');
            const arrow = document.getElementById('sideMenuArrow');

            panel.classList.toggle('open');
            arrow.classList.toggle('rotate');
        }
    </script>
