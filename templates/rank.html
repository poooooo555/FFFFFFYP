<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>學習排名榜 - 普通話練習平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef5ff 0%, #d9eaff 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .rank-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .rank-header {
            background: white;
            border-radius: 32px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(52, 152, 219, 0.2);
        }

        .rank-header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e6f9f, #2980b9);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .rank-header p {
            color: #2c5a7a;
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .rank-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            border-top: 4px solid;
            text-align: center;
        }

        .rank-card.pinyin-card { border-top-color: #3b82f6; }
        .rank-card.speaking-card { border-top-color: #2c7da0; }
        .rank-card.listening-card { border-top-color: #5dade2; }

        .card-icon {
            font-size: 1.8rem;
            font-weight: 600;
            background: #eef5ff;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            margin: 0 auto 12px;
            color: #1f618d;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e4663;
        }

        .accuracy-badge {
            background: #e9f0f9;
            border-radius: 40px;
            padding: 6px 16px;
            display: inline-block;
            font-weight: 600;
            font-size: 1rem;
            margin: 10px 0;
            color: #1f5e8c;
        }

        .rank-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1f6392;
        }

        .rank-label {
            color: #4a6f8f;
            font-size: 0.8rem;
        }

        .divider {
            height: 1px;
            background: #e2edf7;
            margin: 12px 0;
        }

        .user-stat {
            font-size: 0.8rem;
            color: #2c6b9e;
            background: #f4faff;
            padding: 6px;
            border-radius: 30px;
        }

        .search-card {
            background: white;
            border-radius: 28px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
            border: 1px solid #cde4f5;
        }

        .search-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #1f5e8c;
            margin-bottom: 20px;
        }

        .selector-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }

        .selector-item {
            flex: 1;
            min-width: 180px;
        }

        .selector-item label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c6b9e;
            margin-bottom: 8px;
        }

        .selector-item select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid #cde0ed;
            border-radius: 40px;
            background: #fefefe;
            outline: none;
            color: #1f3e53;
            cursor: pointer;
        }

        .selector-item select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .selector-item input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid #cde0ed;
            border-radius: 40px;
            background: #fefefe;
            outline: none;
            color: #1f3e53;
        }

        .selector-item input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }

        .btn-primary {
            background: #2980b9;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: #1f6392;
        }

        .search-hint {
            font-size: 0.8rem;
            color: #5dade2;
            margin-top: 15px;
            text-align: center;
        }

        .leaderboard-section {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
        }

        .leaderboard-title {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
            padding-bottom: 16px;
            margin-bottom: 20px;
            border-bottom: 2px solid;
        }

        .leaderboard-title.pinyin { border-bottom-color: #3b82f6; color: #3b82f6; }
        .leaderboard-title.speaking { border-bottom-color: #2c7da0; color: #2c7da0; }
        .leaderboard-title.listening { border-bottom-color: #5dade2; color: #5dade2; }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .rank-table th {
            background: #eef3fc;
            padding: 12px 10px;
            text-align: center;
            font-weight: 600;
            color: #1f5e8c;
            border-bottom: 1px solid #cde0ed;
        }

        .rank-table td {
            padding: 10px 10px;
            text-align: center;
            border-bottom: 1px solid #e2edf7;
            color: #2c5a7a;
        }

        .rank-table tr:hover {
            background: #f0f7fe;
        }

        .rank-table .highlight-row {
            background: #d4e6f5 !important;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px #2980b9;
        }

        .rank-num {
            font-weight: 700;
            color: #1f6392;
        }

        .username-cell {
            font-weight: 500;
            text-align: left;
        }

        .accuracy-cell {
            font-weight: 600;
            color: #1e6f9f;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #2c6b9e;
        }

        .error-msg {
            background: #ffe6e5;
            color: #b33;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 15px 0;
            text-align: center;
        }

        .empty-table {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #5483a3;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .rank-table th, .rank-table td {
                padding: 8px 5px;
                font-size: 0.75rem;
            }
            .selector-group {
                flex-direction: column;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .listening-icon {
    background-image: url("/static/images/listening-icon.png");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
}

.speaking-icon {

.pinyinTraining-icon{

.toneTrainin-icon{

.initialsTraining-icon{

.side-function-menu {
    position: fixed;
    top: 180px;
    left: 0;
    z-index: 999;
    display: flex;
    align-items: flex-start;
}

/* 收起时显示的按钮 */
.side-menu-toggle {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    border: none;
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: white;
    padding: 16px 10px;
    border-radius: 0 14px 14px 0;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 140px;
}

.side-menu-toggle:hover {
    background: linear-gradient(135deg, #2980b9, #1f6fa5);
}

.side-menu-text {
    letter-spacing: 2px;
}

.side-menu-arrow {
    writing-mode: initial;
    text-orientation: initial;
    display: inline-block;
    transition: transform 0.3s ease;
    font-size: 14px;
    margin-top: 8px;
}

.side-menu-arrow.rotate {
    transform: rotate(90deg);
}

/* 展开的面板 */
.side-menu-panel {
    width: 0;
    overflow: hidden;
    background: white;
    border-radius: 0 16px 16px 0;
    box-shadow: 6px 8px 24px rgba(0, 0, 0, 0.12);
    transition: width 0.3s ease, padding 0.3s ease;
    padding: 0;
    max-height: 80vh;
    overflow-y: auto;
}

/* 展开状态 */
.side-menu-panel.open {
    width: 240px;
    padding: 14px;
}

/* 每个项目 */
.side-menu-item {
    display: block;
    text-decoration: none;
    color: #2c3e50;
    background: #f8fbff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    transition: all 0.25s ease;
    border: 1px solid transparent;
}

.side-menu-item:last-child {
    margin-bottom: 0;
}

.side-menu-item:hover {
    background: #eef6ff;
    border-color: #3498db;
    transform: translateX(4px);
}

.side-menu-item-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.side-menu-item-left span {
    font-size: 15px;
    font-weight: 600;
    color: #2c3e50;
}

/* 左侧菜单图示尺寸，不影响你原本 nav-icon */
.side-icon {
    width: 34px;
    height: 34px;
    margin-bottom: 0;
    flex-shrink: 0;
}

/* 手机版避免遮挡内容 */
@media (max-width: 768px) {
    .side-function-menu {
        top: 140px;
    }

    .side-menu-panel.open {
        width: 200px;
    }

    .side-menu-toggle {
        min-height: 120px;
        font-size: 14px;
        padding: 12px 8px;
    }

    .side-menu-item-left span {
        font-size: 14px;
    }

    .side-icon {
        width: 28px;
        height: 28px;
    }
}
    </style>
</head>

<div class="rank-container">
    <div class="rank-header">
        <h1>學習排名</h1>
        <p>查看您的學習成績 · 搜尋其他用戶排名</p>
    </div>


    <div class="stats-grid">
        <div class="rank-card pinyin-card">
            <div class="card-icon">拼</div>
            <div class="card-title">拼音</div>
            <div class="accuracy-badge" id="pinyinAccuracy">-- %</div>
            <div class="rank-number" id="pinyinRank">--</div>
            <div class="rank-label">全平台排名</div>

            <div class="user-stat" id="pinyinDetailStat">練習次數: --</div>
        </div>
        <div class="rank-card speaking-card">
            <div class="card-icon">說</div>

            <div class="rank-number" id="speakingRank">--</div>
            <div class="rank-label">全平台排名</div>
            <div class="divider"></div>
            <div class="user-stat" id="speakingDetailStat">練習次數: --</div>
        </div>
        <div class="rank-card listening-card">
            <div class="card-icon">聽</div>
            <div class="card-title">聆聽</div>
            <div class="accuracy-badge" id="listeningAccuracy">-- %</div>
            <div class="rank-number" id="listeningRank">--</div>
            <div class="rank-label">全平台排名</div>
            <div class="divider"></div>
            <div class="user-stat" id="listeningDetailStat">練習次數: --</div>
        </div>
    </div>

    <div class="search-card">
        <div class="search-title">排名查詢</div>
        <div class="selector-group">
            <div class="selector-item">
                <label>選擇練習類型</label>
                <select id="rankTypeSelect">
                    <option value="pinyin">拼音排名</option>
                    <option value="speaking">說話排名</option>
                    <option value="listening">聆聽排名</option>
                </select>
            </div>
            <div class="selector-item">
                <label>搜尋用戶 (ID或用戶名)</label>
                <input type="text" id="searchInput" placeholder="輸入後會搜尋對應用戶，留空則搜尋自己">
            </div>

                <label>&nbsp;</label>
                <button id="searchBtn" class="btn-primary">搜尋</button>

<script>
    let currentViewUserId = null;
    let pinyinRankingList = [];
    let speakingRankingList = [];
    let listeningRankingList = [];
    let currentRankType = 'pinyin';
    let currentHighlightUserId = null;

    let currentUserData = {
        pinyin: { accuracy: 0, rank: 0, total: 0 },
        speaking: { accuracy: 0, rank: 0, total: 0 },
        listening: { accuracy: 0, rank: 0, total: 0 }
    };

    function toggleSideMenu() {
        const panel = document.getElementById('sideMenuPanel');
        const arrow = document.getElementById('sideMenuArrow');

        panel.classList.toggle('open');
        arrow.classList.toggle('rotate');
    }

    function getCurrentUserId() {
        return localStorage.getItem('user_id');
    }

    function showError(msg) {
        const errDiv = document.getElementById('searchError');
        errDiv.innerText = msg;
        errDiv.style.display = 'block';
        setTimeout(() => { errDiv.style.display = 'none'; }, 3000);
    }

    function clearHighlight() {
        const tbody = document.getElementById('tableBody');
        const rows = tbody.querySelectorAll('tr');
        rows.forEach(row => {
            row.classList.remove('highlight-row');
        });
        currentHighlightUserId = null;
    }

    function updateUserCards() {
        document.getElementById('pinyinAccuracy').innerHTML = (currentUserData.pinyin.accuracy || 0) + '%';
        document.getElementById('pinyinRank').innerHTML = '第 ' + (currentUserData.pinyin.rank || 1) + ' 名';
        document.getElementById('pinyinDetailStat').innerHTML = '練習次數: ' + (currentUserData.pinyin.total || 0);

        document.getElementById('speakingAccuracy').innerHTML = (currentUserData.speaking.accuracy || 0) + '%';
        document.getElementById('speakingRank').innerHTML = '第 ' + (currentUserData.speaking.rank || 1) + ' 名';
        document.getElementById('speakingDetailStat').innerHTML = '練習次數: ' + (currentUserData.speaking.total || 0);

        document.getElementById('listeningAccuracy').innerHTML = (currentUserData.listening.accuracy || 0) + '%';
        document.getElementById('listeningRank').innerHTML = '第 ' + (currentUserData.listening.rank || 1) + ' 名';
        document.getElementById('listeningDetailStat').innerHTML = '練習次數: ' + (currentUserData.listening.total || 0);
    }

    function highlightUserInTable(searchTerm, isSelfSearch = false) {
        let finalSearchTerm = searchTerm;

        if (!finalSearchTerm && isSelfSearch) {
            const myId = getCurrentUserId();
            if (!myId) {
                showError('請先登入');
                return false;
            }
            finalSearchTerm = myId;
        }

        if (!finalSearchTerm) {
            showError('請輸入用戶 ID 或用戶名');
            return false;
        }

        const tbody = document.getElementById('tableBody');
        const rows = tbody.querySelectorAll('tr');

        let found = false;
        let matchedRow = null;

        rows.forEach(row => {
            const usernameCell = row.cells[1];
            const username = usernameCell ? usernameCell.innerText : '';
            const userId = row.getAttribute('data-user-id') || '';

            if (username === finalSearchTerm || userId === finalSearchTerm) {
                found = true;
                matchedRow = row;
            }
        });

        if (found && matchedRow) {
            clearHighlight();
            matchedRow.classList.add('highlight-row');
            currentHighlightUserId = matchedRow.getAttribute('data-user-id');
            matchedRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return true;
        } else {
            showError(`找不到用戶: ${finalSearchTerm}`);
            return false;
        }
    }

    function renderRankingTable(rankType, highlightUserId = null) {
        let rankingList = [];
        let titleText = '';
        let titleClass = '';
        let headers = [];

        switch(rankType) {
            case 'pinyin':
                rankingList = pinyinRankingList;
                titleText = '拼音排名';
                titleClass = 'pinyin';
                headers = ['排名', '用戶名稱', '拼音平均分數', '練習次數'];
                break;
            case 'speaking':
                rankingList = speakingRankingList;
                titleText = '說話排名';
                titleClass = 'speaking';
                headers = ['排名', '用戶名稱', '說話平均分數', '練習次數'];
                break;
            case 'listening':
                rankingList = listeningRankingList;
                titleText = '聆聽排名';
                titleClass = 'listening';
                headers = ['排名', '用戶名稱', '聆聽平均分數', '練習次數'];
                break;
        }

        const titleDiv = document.getElementById('leaderboardTitle');
        titleDiv.textContent = titleText;
        titleDiv.className = `leaderboard-title ${titleClass}`;

        const headerRow = document.getElementById('tableHeader');
        headerRow.innerHTML = '';
        headers.forEach(header => {
            const th = document.createElement('th');
            th.textContent = header;
            headerRow.appendChild(th);
        });

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (!rankingList || rankingList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-table">暫無排名數據</td></tr>';
            return;
        }

        rankingList.forEach((user, idx) => {
            const row = tbody.insertRow();
            row.setAttribute('data-user-id', user.user_id);
            if (highlightUserId && user.user_id === highlightUserId) {
                row.classList.add('highlight-row');
            }
            row.insertCell(0).innerHTML = `<span class="rank-num">${idx + 1}</span>`;
            row.insertCell(1).className = 'username-cell';
            row.insertCell(1).innerText = user.username || '未知';
            row.insertCell(2).className = 'accuracy-cell';
            row.insertCell(2).innerText = (user.accuracy || 0) + '分';
            row.insertCell(3).innerText = user.total || 0;
        });
    }

    function updateUserDataFromRankings(userId) {
        const pinyinUser = pinyinRankingList.find(u => u.user_id === userId);
        if (pinyinUser) {
            currentUserData.pinyin.accuracy = pinyinUser.accuracy;
            currentUserData.pinyin.rank = pinyinRankingList.findIndex(u => u.user_id === userId) + 1;
            currentUserData.pinyin.total = pinyinUser.total;
        }

        const speakingUser = speakingRankingList.find(u => u.user_id === userId);
        if (speakingUser) {
            currentUserData.speaking.accuracy = speakingUser.accuracy;
            currentUserData.speaking.rank = speakingRankingList.findIndex(u => u.user_id === userId) + 1;
            currentUserData.speaking.total = speakingUser.total;
        }

        const listeningUser = listeningRankingList.find(u => u.user_id === userId);
        if (listeningUser) {
            currentUserData.listening.accuracy = listeningUser.accuracy;
            currentUserData.listening.rank = listeningRankingList.findIndex(u => u.user_id === userId) + 1;
            currentUserData.listening.total = listeningUser.total;
        }

        updateUserCards();
    }

    async function loadRankings(targetUserId) {
        try {
            document.getElementById('tableLoading').style.display = 'block';

            const url = `/api/rankings?user_id=${encodeURIComponent(targetUserId)}`;
            const response = await fetch(url);
            const data = await response.json();

            if (!data.success) {
                showError(data.error || '無法取得排名資料');
                document.getElementById('tableLoading').style.display = 'none';
                return false;
            }

            currentViewUserId = targetUserId;

            pinyinRankingList = data.pinyin_ranking || [];
            speakingRankingList = data.speaking_ranking || [];
            listeningRankingList = data.listening_ranking || [];

            updateUserDataFromRankings(targetUserId);

            renderRankingTable(currentRankType, targetUserId);
            currentHighlightUserId = targetUserId;

            document.getElementById('tableLoading').style.display = 'none';
            return true;
        } catch (err) {
            console.error(err);
            showError('網絡錯誤，請稍後重試');
            document.getElementById('tableLoading').style.display = 'none';
            return false;
        }
    }

    function onRankTypeChange() {
        currentRankType = document.getElementById('rankTypeSelect').value;
        renderRankingTable(currentRankType, currentHighlightUserId);
    }

    function onSearch() {
        const searchTerm = document.getElementById('searchInput').value.trim();

        if (!searchTerm) {
            const myId = getCurrentUserId();
            if (!myId) {
                showError('請先登入');
                return;
            }
            highlightUserInTable(myId, true);
            document.getElementById('searchInput').value = '';
            return;
        }

        highlightUserInTable(searchTerm, false);
        document.getElementById('searchInput').value = '';
    }

    async function init() {
        const myId = getCurrentUserId();
        if (!myId) {
            showError('您尚未登入，請先登入以查看排名');
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="empty-table">請先登入查看排名</td></tr>';
            return;
        }
        await loadRankings(myId);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('rankTypeSelect').addEventListener('change', onRankTypeChange);
        document.getElementById('searchBtn').addEventListener('click', onSearch);

        const searchInput = document.getElementById('searchInput');
        if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') onSearch();
            });
        }

        init();
    });
</script>
</body>
</html>
