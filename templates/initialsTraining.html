<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通話聲母發音訓練</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.2rem;
        }

        .instructions {
            background: #e8f4fc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid #3498db;
        }

        .instructions h3 {
            color: #2980b9;
            margin-bottom: 10px;
        }

        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .filter-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 15px;
            background: #ecf0f1;
            border: 2px solid #bdc3c7;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: #d5dbdb;
        }

        .filter-btn.active {
            background: #3498db;
            color: white;
            border-color: #2980b9;
        }

        .initials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .initial-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .initial-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .card-header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .initial-symbol {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .initial-name {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card-content {
            padding: 20px;
        }

        .example-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .example-item {
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3rem;
            border-left: 4px solid #3498db;
            transition: background 0.2s ease;
        }

        .example-item:hover {
            background: #e9f7fe;
        }

        .pinyin {
            display: block;
            font-size: 0.9rem;
            color: #e74c3c;
            margin-top: 5px;
            font-weight: bold;
        }

        .pronunciation-hint {
            margin-top: 15px;
            padding: 12px;
            background: #fef9e7;
            border-radius: 8px;
            font-size: 0.95rem;
            border-left: 4px solid #f1c40f;
        }

        .pronunciation-hint h4 {
            color: #d35400;
            margin-bottom: 8px;
        }

        .practice-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        .practice-btn:hover {
            background: #27ae60;
        }

        .audio-section {
            margin-top: 15px;
            padding: 15px;
            background: #f4f6f6;
            border-radius: 8px;
        }

        .audio-btn {
            padding: 10px 20px;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 10px;
            transition: background 0.3s ease;
        }

        .audio-btn:hover {
            background: #8e44ad;
        }

        .highlight-ao {
            background-color: #e8f6f3;
            border-left-color: #1abc9c;
        }

        .highlight-ai {
            background-color: #fdedec;
            border-left-color: #e74c3c;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }


        @media (max-width: 768px) {
            .initials-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }

            .example-list {
                grid-template-columns: 1fr;
            }
        }
        .side-function-menu {
    position: fixed;
    top: 180px;
    left: 0;
    z-index: 999;
    display: flex;
    align-items: flex-start;
}

/* 收起时显示的按钮 */
.side-menu-toggle {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    border: none;
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: white;
    padding: 16px 10px;
    border-radius: 0 14px 14px 0;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 4px 4px 12px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 140px;
}

.side-menu-toggle:hover {
    background: linear-gradient(135deg, #2980b9, #1f6fa5);
}

.side-menu-text {
    letter-spacing: 2px;
}

.side-menu-arrow {
    writing-mode: initial;
    text-orientation: initial;
    display: inline-block;
    transition: transform 0.3s ease;
    font-size: 14px;
    margin-top: 8px;
}

.side-menu-arrow.rotate {
    transform: rotate(90deg);
}

/* 展开的面板 */
.side-menu-panel {
    width: 0;
    overflow: hidden;
    background: white;
    border-radius: 0 16px 16px 0;
    box-shadow: 6px 8px 24px rgba(0, 0, 0, 0.12);
    transition: width 0.3s ease, padding 0.3s ease;
    padding: 0;
    max-height: 80vh;
    overflow-y: auto;
}

/* 展开状态 */
.side-menu-panel.open {
    width: 240px;
    padding: 14px;
}

/* 每个项目 */
.side-menu-item {
    display: block;
    text-decoration: none;
    color: #2c3e50;
    background: #f8fbff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    transition: all 0.25s ease;
    border: 1px solid transparent;
}

.side-menu-item:last-child {
    margin-bottom: 0;
}

.side-menu-item:hover {
    background: #eef6ff;
    border-color: #3498db;
    transform: translateX(4px);
}

.side-menu-item-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.side-menu-item-left span {
    font-size: 15px;
    font-weight: 600;
    color: #2c3e50;
}

/* 左侧菜单图示尺寸，不影响你原本 nav-icon */
.side-icon {
    width: 34px;
    height: 34px;
    margin-bottom: 0;
    flex-shrink: 0;
}

/* 手机版避免遮挡内容 */
@media (max-width: 768px) {
    .side-function-menu {
        top: 140px;
    }

    .side-menu-panel.open {
        width: 200px;
    }

    .side-menu-toggle {
        min-height: 120px;
        font-size: 14px;
        padding: 12px 8px;
    }

    .side-menu-item-left span {
        font-size: 14px;
    }

    .side-icon {
        width: 28px;
        height: 28px;
    }
}

    <div class="container">
        <header>
            <h1>普通話聲母發音訓練</h1>
            <p class="subtitle">包含所有21個聲母，每個聲母提供10個範例字詞</p>
            <a href="/" class="back-link">← 返回主頁</a>
        </header>

        <div class="instructions">
            <h3>使用說明</h3>
            <p>1. 每個聲母卡片包含10個範例字，涵蓋不同韻母組合（包括ao、ai等）</p>
            <p>2. 點擊「播放發音」按鈕可聆聽標準普通話發音</p>
            <p>3. 使用篩選按鈕可快速找到包含特定韻母的聲母練習</p>
            <p>4. 每個範例字包含拼音標注，紅色拼音為ao/ai韻母</p>
        </div>

        <div class="filter-section">
            <h3>快速篩選</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部聲母</button>
                <button class="filter-btn" data-filter="ao">包含 ao 韻母</button>
                <button class="filter-btn" data-filter="ai">包含 ai 韻母</button>
                <button class="filter-btn" data-filter="difficult">難點聲母(難點聲母) (zh/ch/sh/z/c/s)</button>
            </div>
        </div>

        <div class="initials-grid" id="initialsContainer">

        </div>

        </footer>

        // Rendering initial consonant cards
        function renderInitials(data) {
            const container = document.getElementById('initialsContainer');
            container.innerHTML = '';

            data.forEach(initial => {
                const card = document.createElement('div');
                card.className = 'initial-card';
                card.dataset.initial = initial.symbol;

                // Check if it contains the vowel letters ao or ai.
                const hasAO = initial.examples.some(example =>
                    example.pinyin.includes('ao') || example.pinyin.includes('āo') ||
                    example.pinyin.includes('áo') || example.pinyin.includes('ǎo') ||
                    example.pinyin.includes('ào')
                );

                const hasAI = initial.examples.some(example =>
                    example.pinyin.includes('ai') || example.pinyin.includes('āi') ||
                    example.pinyin.includes('ái') || example.pinyin.includes('ǎi') ||
                    example.pinyin.includes('ài')
                );

                card.dataset.hasAO = hasAO;
                card.dataset.hasAI = hasAI;

                // Determine if it is a difficult initial consonant
                const difficultInitials = ['zh', 'ch', 'sh', 'z', 'c', 's'];
                card.dataset.isDifficult = difficultInitials.includes(initial.symbol);

                // Build a sample character HTML
                let examplesHTML = '';
                initial.examples.forEach(example => {
                    // Check if pinyin has "ao" or "ai"
                    const isAO = example.pinyin.includes('ao') || example.pinyin.includes('āo') ||
                                example.pinyin.includes('áo') || example.pinyin.includes('ǎo') ||
                                example.pinyin.includes('ào');
                    const isAI = example.pinyin.includes('ai') || example.pinyin.includes('āi') ||
                                example.pinyin.includes('ái') || example.pinyin.includes('ǎi') ||
                                example.pinyin.includes('ài');

                    let exampleClass = 'example-item';
                    if (isAO) exampleClass += ' highlight-ao';
                    if (isAI) exampleClass += ' highlight-ai';

                    examplesHTML += `
                        <div class="${exampleClass}">
                            ${example.char}
                            <span class="pinyin">${example.pinyin}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="card-header">
                        <div class="initial-symbol">${initial.symbol}</div>
                        <div class="initial-name">${initial.name}</div>
                    </div>
                    <div class="card-content">
                        <div class="example-list">
                            ${examplesHTML}
                        </div>
                        <div class="pronunciation-hint">
                            <h4>發音要領</h4>
                            <p>${initial.hint}</p>
                        </div>
                        <div class="audio-section">
                            <button class="audio-btn" onclick="playExamples(['${initial.examples.map(e => e.char).join("','")}'])">播放範例</button>
                `;

                container.appendChild(card);
            });
        }

        // Set up filter button
        function setupFilterButtons() {
            const filterButtons = document.querySelectorAll('.filter-btn');

            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // Remove active class from all buttons
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    // Add active class to current button
                    this.classList.add('active');

                    const filter = this.dataset.filter;
                    filterInitials(filter);
                });
            });
        }

        // Filter initials
        function filterInitials(filter) {
            const cards = document.querySelectorAll('.initial-card');

            cards.forEach(card => {
                let showCard = true;

                switch(filter) {
                    case 'ao':
                        showCard = card.dataset.hasAO === 'true';
                        break;
                    case 'ai':
                        showCard = card.dataset.hasAI === 'true';
                        break;
                    case 'difficult':
                        showCard = card.dataset.isDifficult === 'true';
                        break;
                    case 'all':
                    default:
                        showCard = true;
                        break;
                }

                card.style.display = showCard ? 'block' : 'none';
            });
        }

        // Play pronunciation function (mock)
        function playInitial(initial) {
            // Connect Voice API
            const msg = new SpeechSynthesisUtterance(`${initial}`);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);

        }

        function playExamples(chars) {
            // Connect Voice API
            const words = Array.isArray(chars) ? chars : [chars];
            words.forEach((char, index) => {
                setTimeout(() => {
                    const msg = new SpeechSynthesisUtterance(char);
                    msg.lang = 'zh-CN';
                    msg.rate = 0.8;
                    window.speechSynthesis.speak(msg);
                }, index * 800);
            });

        }
